<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Inteligente</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial;
            background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .header {
            background: linear-gradient(135deg, #0ea5e9 0%, #10b981 100%);
            color: white;
            padding: 25px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .status {
            font-size: 14px;
            opacity: 0.9;
            font-weight: 600;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fafbfc;
            scroll-behavior: smooth;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user .message-content {
            background: linear-gradient(135deg, #0ea5e9 0%, #10b981 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot .message-content {
            background: #e0f2fe;
            color: #0c4a6e;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
        }

        input:focus {
            border-color: #0ea5e9;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        #enviarBtn,
        #iniciarBtn {
            background: linear-gradient(135deg, #0ea5e9 0%, #10b981 100%);
            color: white;
        }

        #encerrarBtn {
            background: #f0f0f0;
            color: #666;
            display: none;
        }

        .input-area.disabled input,
        .input-area.disabled #enviarBtn {
            pointer-events: none;
            opacity: 0.5;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="header">
        <h1>Chatbot Inteligente</h1>
        <p id="status" class="status">Clique em "Iniciar" para começar</p>
    </div>

    <div class="chat-box" id="chat">
        <div class="empty-state">
            <p>Inicie uma conversa para começar</p>
        </div>
    </div>

    <div class="input-area disabled" id="inputArea">
        <input type="text" id="mensagem" placeholder="Digite sua mensagem aqui...">

        <div class="button-group">
            <button id="enviarBtn" onclick="enviarMensagem()">Enviar</button>
            <button id="iniciarBtn" onclick="iniciarChat()">Iniciar</button>
            <button id="encerrarBtn" onclick="encerrarChat()">Encerrar</button>
        </div>
    </div>
</div>

<script>
    let chatAtivo = false;
    let aguardandoNome = false;
    let nomeUsuario = "";

    function iniciarChat() {
        chatAtivo = true;
        aguardandoNome = true;
        nomeUsuario = "";

        document.getElementById("chat").innerHTML = "";
        document.getElementById("inputArea").classList.remove("disabled");
        document.getElementById("iniciarBtn").style.display = "none";
        document.getElementById("encerrarBtn").style.display = "block";
        document.getElementById("status").textContent = "Chat ativo";
        document.getElementById("mensagem").focus();

        adicionarMensagemBot("Olá! Antes de começarmos, como você gostaria de ser chamado?");
    }

    function encerrarChat() {
        chatAtivo = false;
        aguardandoNome = false;
        nomeUsuario = "";

        document.getElementById("chat").innerHTML =
            '<div class="empty-state"><p>Chat encerrado. Clique em "Iniciar" para começar uma nova conversa.</p></div>';

        document.getElementById("inputArea").classList.add("disabled");
        document.getElementById("iniciarBtn").style.display = "block";
        document.getElementById("encerrarBtn").style.display = "none";
        document.getElementById("mensagem").value = "";
        document.getElementById("status").textContent = 'Clique em "Iniciar" para começar';
    }

    async function enviarMensagem() {
        if (!chatAtivo) return;

        const input = document.getElementById("mensagem");
        const mensagem = input.value.trim();

        if (!mensagem) return;

        adicionarMensagemUsuario(mensagem);
        input.value = "";

        if (aguardandoNome) {
            nomeUsuario = mensagem;
            aguardandoNome = false;

            adicionarMensagemBot(
                `Prazer, ${escapeHtml(nomeUsuario)}! Posso te ajudar com assuntos sobre limite, cartão, fatura, senha, compras, pagamentos e parcelamentos. O que você gostaria de saber?`
            );

            return;
        }

        try {
            const response = await fetch("/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ mensagem: mensagem })
            });

            if (!response.ok) {
                throw new Error("Erro na rota /chat");
            }

            const data = await response.json();

            adicionarMensagemBot(`${escapeHtml(nomeUsuario)}, ${escapeHtml(data.resposta)}`);
        } catch (error) {
            console.error(error);
            adicionarMensagemBot("Desculpe, houve um erro ao processar sua mensagem.");
        }
    }

    function adicionarMensagemUsuario(texto) {
        const userMsg = document.createElement("div");
        userMsg.className = "message user";
        userMsg.innerHTML = '<div class="message-content">' + escapeHtml(texto) + "</div>";
        document.getElementById("chat").appendChild(userMsg);
        scrollToBottom();
    }

    function adicionarMensagemBot(texto) {
        const botMsg = document.createElement("div");
        botMsg.className = "message bot";
        botMsg.innerHTML = '<div class="message-content">' + texto + "</div>";
        document.getElementById("chat").appendChild(botMsg);
        scrollToBottom();
    }

    function scrollToBottom() {
        const chatBox = document.getElementById("chat");
        setTimeout(() => {
            chatBox.scrollTop = chatBox.scrollHeight;
        }, 0);
    }

    function escapeHtml(text) {
        const map = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#039;"
        };

        return String(text).replace(/[&<>"']/g, function(m) {
            return map[m];
        });
    }

    document.getElementById("mensagem").addEventListener("keypress", function(e) {
        if (e.key === "Enter" && chatAtivo) {
            enviarMensagem();
        }
    });
</script>

</body>
</html>
